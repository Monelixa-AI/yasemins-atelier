# Scheduled Jobs — DISABLED until production secrets are configured
# To enable: uncomment the schedule section and add CRON_SECRET to GitHub Secrets
#
# Required GitHub Secrets:
#   CRON_SECRET — must match the CRON_SECRET env var on Vercel
#
# Required: yaseminsatelier.com must be live and responding

name: Scheduled Jobs

on:
  # schedule:
  #   - cron: "0 8 * * *"    # daily 08:00 UTC
  #   - cron: "0 10 * * *"   # reminders 10:00
  #   - cron: "0 3 * * *"    # expire-points 03:00
  #   - cron: "0 8 * * 1"    # weekly-report Monday
  #   - cron: "0 8 1 * *"    # monthly-report 1st
  workflow_dispatch:

jobs:
  run-crons:
    runs-on: ubuntu-latest
    steps:
      - name: Daily cron
        run: curl -sf -H "Authorization:Bearer ${{ secrets.CRON_SECRET }}" https://yaseminsatelier.com/api/cron/daily || echo "Skipped — not configured"

      - name: Reminders
        run: curl -sf -H "Authorization:Bearer ${{ secrets.CRON_SECRET }}" https://yaseminsatelier.com/api/cron/reminders || echo "Skipped"

      - name: Expire points
        run: curl -sf -H "Authorization:Bearer ${{ secrets.CRON_SECRET }}" https://yaseminsatelier.com/api/cron/expire-points || echo "Skipped"

      - name: Weekly report
        run: curl -sf -H "Authorization:Bearer ${{ secrets.CRON_SECRET }}" https://yaseminsatelier.com/api/cron/weekly-report || echo "Skipped"

      - name: Monthly report
        run: curl -sf -H "Authorization:Bearer ${{ secrets.CRON_SECRET }}" https://yaseminsatelier.com/api/cron/monthly-report || echo "Skipped"
