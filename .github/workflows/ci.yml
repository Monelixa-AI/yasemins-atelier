# CI — DISABLED until GitHub Secrets are configured
# To enable: uncomment the push/pull_request triggers
#
# Required GitHub Secrets:
#   DATABASE_URL, DIRECT_URL

name: CI

on:
  # push:
  #   branches: [main]
  # pull_request:
  #   branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      - run: npx tsc --noEmit
      - run: npx next build
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      NEXTAUTH_SECRET: "ci-secret"
      NEXTAUTH_URL: "https://yaseminsatelier.com"
      NEXT_PUBLIC_APP_URL: "https://yaseminsatelier.com"
